kind = "web"
previewPath = "/"
title = "Ask Institute"
version = "1.0.0"
id = "artifacts/ask-institute"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22111

[services.development]
run = "pnpm --filter @workspace/ask-institute run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ask-institute", "run", "build" ]
publicDir = "artifacts/ask-institute/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22111"
BASE_PATH = "/"
